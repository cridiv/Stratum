<svg
  width="24"
  height="16"
  viewBox="0 0 24 16"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Top bar — shortest, most faded -->
  <rect x="0" y="0"  width="12" height="2.5" rx="1.25" fill="#E8B96A" opacity="0.28" />
  <!-- Middle bar -->
  <rect x="0" y="6"  width="18" height="2.5" rx="1.25" fill="#E8B96A" opacity="0.55" />
  <!-- Bottom bar — longest, full opacity -->
  <rect x="0" y="12" width="24" height="2.5" rx="1.25" fill="#E8B96A" opacity="1"    />
</svg>
